<!DOCTYPE HTML>
<html>
    <head>
        <title data-i18n-key="popupTitle">Minimal Bookmarks Tree</title>
        <link rel="stylesheet" type="text/css" href="browser_action_css.css" />
    </head>
    <body>
        <div id="wrapper">
            <div id="toolbar">
                <input
                    id="search"
                    type="search"
                    placeholder="Search bookmarks..."
                    autocomplete="off"
                    spellcheck="false">
            </div>
            <div id="loading">...</div>
            <ul id="bookmarks"></ul>
        </div>
        <script src="browser_action.js"></script>
    </body>
</html>
